<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700&display=swap" rel="stylesheet">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Property Details Page</title>
</head>
<body class="bg-[#141414] text-white font-[Urbanist]">
<header class="flex flex-col border-b border-[#262626]">
    <!-- Thanh thông báo trên cùng (Top Banner) -->
    <div class="bg-[#1A1A1A] flex px-40 py-4.5 items-center justify-center gap-2.5 self-stretch border-b border-[#262626] text-[18px] font-medium leading-[150%] relative">
        <!-- Nội dung thông báo -->
        <span>✨Discover Your Dream Property with Estatein</span>
        <!-- Liên kết tìm hiểu thêm -->
        <a class="underline " href="">Learn More</a>
        <!-- Nút đóng thông báo -->
        <button class="absolute w-6 h-6 bg-white/10 top-4.75 right-8 p-1 rounded-[75px]">
            <img src="./icon/Icon.svg" alt="Close Icon">
        </button>
    </div>
    <!-- Thanh điều hướng chính (Navigation Bar) -->
    <nav class="flex bg-[#1A1A1A] py-5 px-40.5 items-center justify-between self-stretch text-[18px] font-medium leading-[150%]">
        <!-- Logo thương hiệu: Gồm biểu tượng và tên thương hiệu -->
        <div class="flex w-40 items-center justify-center gap-2">
            <img src="./icon/Symbol.svg" alt="Estatein Logo">
            <span class="text-2xl">Estatein</span>
        </div>
        <!-- Menu điều hướng: Chứa các liên kết chính của trang web -->
        <div class="menu">
            <ul class="flex items-center gap-7.5 ">
                <!-- Các mục menu -->
                <li><a href="">Home</a></li>
                <li><a href="">About Us</a></li>
                <!-- Mục Properties được làm nổi bật với border và background -->
                <li><a class="border border-[#262626] bg-[#141414] rounded-[10px] px-5 py-3" href="">Properties</a></li>
                <li><a href="">Services</a></li>
            </ul>
        </div>
        <!-- Nút liên hệ (Contact US) -->
        <a href=""
           class="py-4 px-6 rounded-[10px] border border-[#262626]">Contact
            US
        </a>
    </nav>
</header>
<!-- Nội dung chính của trang -->
<main>

</main>
</body>
</html>
